<div class="app-card">
    <h1>{{ vm.title }}</h1>
    <p>به پروژه‌ی نمونه‌ی Razor Pages + AngularJS خوش آمدید.</p>

    <div class="counter-box">
        <button class="btn btn-danger" ng-click="vm.decrement()">−</button>
        <span class="alert alert-dark">{{ vm.counter }}</span>
        <button class="btn btn-success" ng-click="vm.increment()">+</button>
    </div>

    <p class="hint">این شمارنده کاملاً سمت کلاینت (AngularJS) کار می‌کند، بدون رفرش صفحه.</p>
</div>
