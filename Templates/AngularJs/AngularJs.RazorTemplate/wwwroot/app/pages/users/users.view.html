<div class="card">
    <h1>{{ vm.title }}</h1>

    <p ng-if="vm.loading">در حال بارگذاری...</p>
    <p ng-if="vm.error" class="error">{{ vm.error }}</p>

    <table ng-if="!vm.loading && vm.users.length">
        <thead>
            <tr>
                <th>شناسه</th>
                <th>نام</th>
                <th>ایمیل</th>
            </tr>
        </thead>
        <tbody>
            <tr ng-repeat="user in vm.users">
                <td>{{ user.id }}</td>
                <td>{{ user.name }}</td>
                <td>{{ user.email }}</td>
            </tr>
        </tbody>
    </table>
</div>
